{% extends "base.html" %}

{% block title %}Nuevo Customer{% endblock %}

{% block header %}
<div class="bg-white shadow-sm border-b border-gray-100">
    <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8">
        <h2 class="text-xl font-semibold text-gray-800">Crear Customer</h2>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="py-6">
    <div class="max-w-3xl mx-auto sm:px-6 lg:px-8">
        <div class="bg-white shadow-sm sm:rounded-lg p-6">
            <form action="/views/customer/" method="POST" class="space-y-4">

                <div>
                    <label class="block font-medium text-gray-700">Nombre</label>
                    <input type="text" name="name" value="{{ form.name or '' }}"
                           class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div>
                    <label class="block font-medium text-gray-700">Email</label>
                    <input type="email" name="email" value="{{ form.email or '' }}"
                           class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div>
                    <label class="block font-medium text-gray-700">Contraseña</label>
                    <input type="password" name="password"
                           class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div>
                    <label class="block font-medium text-gray-700">Estado</label>
                    <select name="status" class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm">
                        <option value="true"  {{ 'selected' if form and form.status == true }}>Activo</option>
                        <option value="false" {{ 'selected' if form and form.status == false }}>Inactivo</option>
                    </select>
                </div>

                <div>
                    <label class="block font-medium text-gray-700">Country</label>
                    <select name="country_id" class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm">
                        <option value="">— Sin country —</option>
                        {% for c in countries %}
                        <option value="{{ c.id }}" {{ 'selected' if form and form.country_id == c.id }}>
                            {{ c.name }} ({{ c.code }})
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block font-medium text-gray-700">Image</label>
                    <select name="image_id" class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm">
                        <option value="">— Sin imagen —</option>
                        {% for img in images %}
                        <option value="{{ img.id }}" {{ 'selected' if form and form.image_id == img.id }}>
                            #{{ img.id }} — {{ img.path_256x256 }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="submit"
                            class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm font-medium">
                        Crear Customer
                    </button>
                    <a href="/views/customer/"
                       class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 text-sm font-medium">
                        Cancelar
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>
{% endblock %}
