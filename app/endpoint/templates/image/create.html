{% extends "base.html" %}

{% block title %}Nueva Image{% endblock %}

{% block header %}
<div class="bg-white shadow-sm border-b border-gray-100">
    <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8">
        <h2 class="text-xl font-semibold text-gray-800">Crear Image</h2>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="py-6">
    <div class="max-w-3xl mx-auto sm:px-6 lg:px-8">
        <div class="bg-white shadow-sm sm:rounded-lg p-6">
            <form action="/views/image/" method="POST" class="space-y-4">

                <div>
                    <label class="block font-medium text-gray-700">Path 256×256</label>
                    <input type="text" name="path_256x256" value="{{ form.path_256x256 or '' }}"
                           placeholder="/storage/images/256x256/..."
                           class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm font-mono focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div>
                    <label class="block font-medium text-gray-700">Path 512×512</label>
                    <input type="text" name="path_512x512" value="{{ form.path_512x512 or '' }}"
                           placeholder="/storage/images/512x512/..."
                           class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm font-mono focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="submit"
                            class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm font-medium">
                        Crear Image
                    </button>
                    <a href="/views/image/"
                       class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 text-sm font-medium">
                        Cancelar
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>
{% endblock %}
