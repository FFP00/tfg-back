{% extends "base.html" %}

{% block title %}Editar Wallet — Customer #{{ wallet.customer_id }}{% endblock %}

{% block header %}
<div class="bg-white shadow-sm border-b border-gray-100">
    <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8">
        <h2 class="text-xl font-semibold text-gray-800">Editar Wallet</h2>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="py-6">
    <div class="max-w-3xl mx-auto sm:px-6 lg:px-8">
        <div class="bg-white shadow-sm sm:rounded-lg p-6">
            <form action="/views/wallet/{{ wallet.customer_id }}/update" method="POST" class="space-y-4">

                <div>
                    <label class="block font-medium text-gray-700">Customer</label>
                    <input type="text" value="#{{ wallet.customer_id }}" disabled
                           class="w-full border border-gray-200 bg-gray-50 rounded px-3 py-2 mt-1 text-sm text-gray-500 cursor-not-allowed">
                    <p class="text-xs text-gray-400 mt-1">La clave primaria no se puede modificar.</p>
                </div>

                <div>
                    <label class="block font-medium text-gray-700">Balance ($)</label>
                    <input type="number" name="balance"
                           value="{{ form.balance if form else wallet.balance }}"
                           step="0.01" min="0"
                           class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="submit"
                            class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm font-medium">
                        Actualizar
                    </button>
                    <a href="/views/wallet/{{ wallet.customer_id }}"
                       class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 text-sm font-medium">
                        Cancelar
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>
{% endblock %}
