{% extends "base.html" %}

{% block title %}Editar Title‑Transaction #{{ title_transaction.id }}{% endblock %}

{% block header %}
<div class="bg-white shadow-sm border-b border-gray-100">
    <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8">
        <h2 class="text-xl font-semibold text-gray-800">Editar Title‑Transaction</h2>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="py-6">
    <div class="max-w-3xl mx-auto sm:px-6 lg:px-8">
        <div class="bg-white shadow-sm sm:rounded-lg p-6">
            <form action="/views/title_transaction/{{ title_transaction.id }}/update" method="POST" class="space-y-4">

                <div>
                    <label class="block font-medium text-gray-700">Precio ($)</label>
                    <input type="number" name="price"
                           value="{{ form.price if form else title_transaction.price }}"
                           step="0.01" min="0"
                           class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div>
                    <label class="block font-medium text-gray-700">Descuento (%)</label>
                    <input type="number" name="discount"
                           value="{{ form.discount if form else title_transaction.discount }}"
                           min="0" max="100"
                           class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div>
                    <label class="block font-medium text-gray-700">Title</label>
                    <select name="title_id" class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm">
                        {% set cur_t = (form.title_id if form else title_transaction.title_id) %}
                        {% for t in titles %}
                        <option value="{{ t.id }}" {{ 'selected' if cur_t == t.id }}>
                            #{{ t.id }} — {{ t.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block font-medium text-gray-700">Transaction</label>
                    <select name="transaction_id" class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm">
                        {% set cur_tx = (form.transaction_id if form else title_transaction.transaction_id) %}
                        {% for tx in transactions %}
                        <option value="{{ tx.id }}" {{ 'selected' if cur_tx == tx.id }}>
                            #{{ tx.id }} — Wallet Customer #{{ tx.wallet_customer_id }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="submit"
                            class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm font-medium">
                        Actualizar
                    </button>
                    <a href="/views/title_transaction/{{ title_transaction.id }}"
                       class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 text-sm font-medium">
                        Cancelar
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>
{% endblock %}
