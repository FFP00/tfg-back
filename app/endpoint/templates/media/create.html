{% extends "base.html" %}

{% block title %}Nuevo Media{% endblock %}

{% block header %}
<div class="bg-white shadow-sm border-b border-gray-100">
    <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8">
        <h2 class="text-xl font-semibold text-gray-800">Crear Media</h2>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="py-6">
    <div class="max-w-3xl mx-auto sm:px-6 lg:px-8">
        <div class="bg-white shadow-sm sm:rounded-lg p-6">
            <form action="/views/media/" method="POST" class="space-y-4">

                <div>
                    <label class="block font-medium text-gray-700">Path 300×450</label>
                    <input type="text" name="path_300x450" value="{{ form.path_300x450 or '' }}"
                           placeholder="/storage/media/300x450/..."
                           class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm font-mono focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div>
                    <label class="block font-medium text-gray-700">Path 600×900</label>
                    <input type="text" name="path_600x900" value="{{ form.path_600x900 or '' }}"
                           placeholder="/storage/media/600x900/..."
                           class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm font-mono focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="submit"
                            class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm font-medium">
                        Crear Media
                    </button>
                    <a href="/views/media/"
                       class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 text-sm font-medium">
                        Cancelar
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>
{% endblock %}
