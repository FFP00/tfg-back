{% extends "base.html" %}

{% block title %}Editar Customer‑Title #{{ customer_title.id }}{% endblock %}

{% block header %}
<div class="bg-white shadow-sm border-b border-gray-100">
    <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8">
        <h2 class="text-xl font-semibold text-gray-800">Editar Customer‑Title</h2>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="py-6">
    <div class="max-w-3xl mx-auto sm:px-6 lg:px-8">
        <div class="bg-white shadow-sm sm:rounded-lg p-6">
            <form action="/views/customer_title/{{ customer_title.id }}/update" method="POST" class="space-y-4">

                <div>
                    <label class="block font-medium text-gray-700">Customer</label>
                    <select name="customer_id" class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm">
                        {% set cur_c = (form.customer_id if form else customer_title.customer_id) %}
                        {% for c in customers %}
                        <option value="{{ c.id }}" {{ 'selected' if cur_c == c.id }}>
                            #{{ c.id }} — {{ c.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block font-medium text-gray-700">Title</label>
                    <select name="title_id" class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm">
                        {% set cur_t = (form.title_id if form else customer_title.title_id) %}
                        {% for t in titles %}
                        <option value="{{ t.id }}" {{ 'selected' if cur_t == t.id }}>
                            #{{ t.id }} — {{ t.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block font-medium text-gray-700">Playtime (min)</label>
                    <input type="number" name="playtime"
                           value="{{ form.playtime if form else customer_title.playtime }}"
                           min="0"
                           class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="submit"
                            class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm font-medium">
                        Actualizar
                    </button>
                    <a href="/views/customer_title/{{ customer_title.id }}"
                       class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 text-sm font-medium">
                        Cancelar
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>
{% endblock %}
