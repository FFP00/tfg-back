{% extends "base.html" %}

{% block title %}Nuevo Genre‑Title{% endblock %}

{% block header %}
<div class="bg-white shadow-sm border-b border-gray-100">
    <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8">
        <h2 class="text-xl font-semibold text-gray-800">Crear Genre‑Title</h2>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="py-6">
    <div class="max-w-3xl mx-auto sm:px-6 lg:px-8">
        <div class="bg-white shadow-sm sm:rounded-lg p-6">
            <form action="/views/genre_title/" method="POST" class="space-y-4">

                <div>
                    <label class="block font-medium text-gray-700">Title</label>
                    <select name="title_id" class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm">
                        <option value="">— Seleccionar title —</option>
                        {% for t in titles %}
                        <option value="{{ t.id }}" {{ 'selected' if form and form.title_id == t.id }}>
                            #{{ t.id }} — {{ t.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block font-medium text-gray-700">Genre</label>
                    <select name="genre_id" class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm">
                        <option value="">— Seleccionar genre —</option>
                        {% for g in genres %}
                        <option value="{{ g.id }}" {{ 'selected' if form and form.genre_id == g.id }}>
                            #{{ g.id }} — {{ g.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="submit"
                            class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm font-medium">
                        Crear Genre‑Title
                    </button>
                    <a href="/views/genre_title/"
                       class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 text-sm font-medium">
                        Cancelar
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>
{% endblock %}
