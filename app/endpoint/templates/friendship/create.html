{% extends "base.html" %}

{% block title %}Nueva Friendship{% endblock %}

{% block header %}
<div class="bg-white shadow-sm border-b border-gray-100">
    <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8">
        <h2 class="text-xl font-semibold text-gray-800">Crear Friendship</h2>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="py-6">
    <div class="max-w-3xl mx-auto sm:px-6 lg:px-8">
        <div class="bg-white shadow-sm sm:rounded-lg p-6">
            <form action="/views/friendship/" method="POST" class="space-y-4">

                <div>
                    <label class="block font-medium text-gray-700">Customer 1 <span class="text-xs text-gray-400">(ID menor)</span></label>
                    <select name="customer_id_1" class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm">
                        <option value="">— Seleccionar —</option>
                        {% for c in customers %}
                        <option value="{{ c.id }}" {{ 'selected' if form and form.customer_id_1 == c.id }}>
                            #{{ c.id }} — {{ c.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block font-medium text-gray-700">Customer 2 <span class="text-xs text-gray-400">(ID mayor)</span></label>
                    <select name="customer_id_2" class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm">
                        <option value="">— Seleccionar —</option>
                        {% for c in customers %}
                        <option value="{{ c.id }}" {{ 'selected' if form and form.customer_id_2 == c.id }}>
                            #{{ c.id }} — {{ c.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block font-medium text-gray-700">Estado</label>
                    <select name="status" class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm">
                        <option value="false" {{ 'selected' if form and form.status == false }}>Pendiente</option>
                        <option value="true"  {{ 'selected' if form and form.status == true }}>Aceptada</option>
                    </select>
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="submit"
                            class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm font-medium">
                        Crear Friendship
                    </button>
                    <a href="/views/friendship/"
                       class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 text-sm font-medium">
                        Cancelar
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>
{% endblock %}
