{% extends "base.html" %}

{% block title %}Nueva Review{% endblock %}

{% block header %}
<div class="bg-white shadow-sm border-b border-gray-100">
    <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8">
        <h2 class="text-xl font-semibold text-gray-800">Crear Review</h2>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="py-6">
    <div class="max-w-3xl mx-auto sm:px-6 lg:px-8">
        <div class="bg-white shadow-sm sm:rounded-lg p-6">
            <form action="/views/review/" method="POST" class="space-y-4">

                <div>
                    <label class="block font-medium text-gray-700">Contenido</label>
                    <textarea name="content" rows="4"
                              class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm focus:ring-indigo-500 focus:border-indigo-500">{{ form.content or '' }}</textarea>
                </div>

                <div>
                    <label class="block font-medium text-gray-700">Votos</label>
                    <input type="number" name="votes" value="{{ form.votes or 0 }}"
                           class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div>
                    <label class="block font-medium text-gray-700">¿Recomienda?</label>
                    <select name="recommends" class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm">
                        <option value="true"  {{ 'selected' if form and form.recommends == true }}>Sí</option>
                        <option value="false" {{ 'selected' if form and form.recommends == false }}>No</option>
                    </select>
                </div>

                <div>
                    <label class="block font-medium text-gray-700">Estado</label>
                    <select name="status" class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm">
                        <option value="false" {{ 'selected' if form and form.status == false }}>Pendiente</option>
                        <option value="true"  {{ 'selected' if form and form.status == true }}>Publicada</option>
                    </select>
                </div>

                <div>
                    <label class="block font-medium text-gray-700">Customer‑Title</label>
                    <select name="customer_title_id" class="w-full border border-gray-300 rounded px-3 py-2 mt-1 text-sm">
                        <option value="">— Sin customer‑title —</option>
                        {% for ct in customer_titles %}
                        <option value="{{ ct.id }}" {{ 'selected' if form and form.customer_title_id == ct.id }}>
                            #{{ ct.id }} — Customer #{{ ct.customer_id }} / Title #{{ ct.title_id }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="submit"
                            class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm font-medium">
                        Crear Review
                    </button>
                    <a href="/views/review/"
                       class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 text-sm font-medium">
                        Cancelar
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>
{% endblock %}
