<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} — Burnt</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased min-h-screen">

    <nav class="bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/views/" class="text-lg font-bold text-gray-900 shrink-0">Burnt</a>
                <div class="flex flex-wrap gap-x-4 gap-y-1 justify-end text-xs font-medium text-gray-600">
                    <a href="/views/currency/"    class="hover:text-indigo-600 transition">Currency</a>
                    <a href="/views/genre/"       class="hover:text-indigo-600 transition">Genre</a>
                    <a href="/views/country/"     class="hover:text-indigo-600 transition">Country</a>
                    <a href="/views/developer/"   class="hover:text-indigo-600 transition">Developer</a>
                    <a href="/views/customer/"    class="hover:text-indigo-600 transition">Customer</a>
                    <a href="/views/title/"       class="hover:text-indigo-600 transition">Title</a>
<a href="/views/friendship/"  class="hover:text-indigo-600 transition">Friendship</a>
                    <a href="/views/transaction/" class="hover:text-indigo-600 transition">Transaction</a>
                    <a href="/views/review/"      class="hover:text-indigo-600 transition">Review</a>
                    <a href="/views/token/"       class="hover:text-indigo-600 transition">Token</a>
                </div>
            </div>
        </div>
    </nav>

    {% block header %}{% endblock %}

    {% if success %}
    <div class="max-w-7xl mx-auto sm:px-6 lg:px-8 mt-4">
        <div class="p-3 bg-green-100 text-green-800 rounded shadow-sm">{{ success }}</div>
    </div>
    {% endif %}
    {% if error %}
    <div class="max-w-7xl mx-auto sm:px-6 lg:px-8 mt-4">
        <div class="p-3 bg-red-100 text-red-800 rounded shadow-sm">{{ error }}</div>
    </div>
    {% endif %}

    <main>{% block content %}{% endblock %}</main>

</body>
</html>
