<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Store</title>
    <link rel="stylesheet" href="output.css?v=2" />
</head>
<body class="bg-steam text-ink min-h-screen font-sans antialiased">

    <!-- Loading -->
    <div id="loading" class="flex items-center justify-center min-h-screen">
        <p class="text-dim text-lg animate-pulse">Cargando juego…</p>
    </div>

    <!-- Game page -->
    <div id="game" class="hidden">

        <!-- Header banner -->
        <div class="relative h-64 sm:h-80 overflow-hidden">
            <img id="g-header" src="" alt=""
                 class="w-full h-full object-cover" />
            <div class="absolute inset-0 bg-gradient-to-t from-steam via-steam/40 to-transparent"></div>
        </div>

        <!-- Content -->
        <div class="max-w-5xl mx-auto px-4 sm:px-6 -mt-20 relative pb-20">

            <!-- Top row: capsule + info + button -->
            <div class="flex gap-5 items-end">
                <img id="g-capsule" src="" alt=""
                     class="w-28 sm:w-36 rounded-lg shadow-2xl border border-border flex-shrink-0" />

                <div class="flex-1 min-w-0 pb-1">
                    <h1 id="g-name" class="text-2xl sm:text-3xl font-bold text-white leading-tight truncate"></h1>
                    <p id="g-meta" class="text-dim text-sm mt-1"></p>
                    <p id="g-price" class="text-accent font-semibold text-lg mt-1"></p>
                    <div id="g-genres" class="flex flex-wrap gap-1.5 mt-2"></div>
                </div>

                <button onclick="loadRandom()"
                        class="flex-shrink-0 pb-1 bg-accent hover:bg-blue-500 transition-colors text-white text-sm font-medium px-4 py-2 rounded-md">
                    🎲 Otro juego
                </button>
            </div>

            <!-- Description -->
            <p id="g-desc" class="mt-6 text-ink/80 text-sm leading-relaxed"></p>

            <!-- Trailer -->
            <section class="mt-10">
                <h2 class="text-dim text-xs uppercase tracking-widest mb-3">Trailer</h2>
                <video id="g-trailer" controls preload="metadata"
                       class="w-full rounded-xl bg-black shadow-xl"></video>
            </section>

            <!-- Screenshot gallery -->
            <section class="mt-10">
                <h2 class="text-dim text-xs uppercase tracking-widest mb-3">Capturas</h2>
                <div id="g-gallery"
                     class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3"></div>
            </section>

        </div>
    </div>

    <script src="app.js?v=2"></script>
</body>
</html>
